name: Deploy PLAY TO SKY PRODUCTION to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 1. Preparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Installer, Verifier (Audit/Lint) et Construire
        run: |
          npm install
          npm audit --audit-level=high
          npm run lint --if-present
          npm run build

      - name: 3. Configurer Nginx et SSL
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/playtoskyproductions.com

            # Etape A : obtenir le certificat SSL si absent
            if [ ! -d /etc/letsencrypt/live/playtoskyproductions.com ]; then
              sudo tee /etc/nginx/sites-available/playtoskyproductions.com > /dev/null <<'TMPEOF'
            server {
                server_name playtoskyproductions.com www.playtoskyproductions.com;
                root /var/www/playtoskyproductions.com;
                listen 80;
                listen [::]:80;
            }
            TMPEOF
              if [ ! -L /etc/nginx/sites-enabled/playtoskyproductions.com ]; then
                sudo ln -s /etc/nginx/sites-available/playtoskyproductions.com /etc/nginx/sites-enabled/playtoskyproductions.com
              fi
              sudo nginx -t && sudo systemctl reload nginx
              sudo certbot certonly --nginx \
                -d playtoskyproductions.com -d www.playtoskyproductions.com \
                --non-interactive --agree-tos -m ${{ secrets.CERTBOT_EMAIL }}
            fi

            # Etape B : ecrire le config SSL complet SEULEMENT si le cert existe
            if [ -d /etc/letsencrypt/live/playtoskyproductions.com ]; then
              sudo tee /etc/nginx/sites-available/playtoskyproductions.com > /dev/null <<'NGINXEOF'
            server {
                server_name playtoskyproductions.com www.playtoskyproductions.com;
                limit_req zone=mylimit burst=20 nodelay;
                include conf.d/security-headers.conf;

                root /var/www/playtoskyproductions.com;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                listen [::]:443 ssl;
                listen 443 ssl;
                http2 on;
                ssl_certificate /etc/letsencrypt/live/playtoskyproductions.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/playtoskyproductions.com/privkey.pem;
                include /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
            }
            server {
                if ($host = www.playtoskyproductions.com) {
                    return 301 https://$host$request_uri;
                }
                if ($host = playtoskyproductions.com) {
                    return 301 https://$host$request_uri;
                }
                listen 80;
                listen [::]:80;
                server_name playtoskyproductions.com www.playtoskyproductions.com;
                return 404;
            }
            NGINXEOF
            fi

            if [ ! -L /etc/nginx/sites-enabled/playtoskyproductions.com ]; then
              sudo ln -s /etc/nginx/sites-available/playtoskyproductions.com /etc/nginx/sites-enabled/playtoskyproductions.com
            fi

            sudo nginx -t && sudo systemctl reload nginx

      - name: 4. Preparer le dossier sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /var/www/playtoskyproductions.com
            sudo rm -rf /var/www/playtoskyproductions.com/*

      - name: 5. Envoyer les fichiers prets au serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "/var/www/playtoskyproductions.com/"
          strip_components: 1

      - name: 6. Securiser les droits et recharger Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/playtoskyproductions.com/
            sudo nginx -t && sudo systemctl reload nginx

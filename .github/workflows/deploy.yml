name: Deploy PLAY TO SKY PRODUCTION to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 1. Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Installer, Vérifier (Audit/Lint) et Construire
        run: |
          npm install
          npm audit --audit-level=high
          npm run lint --if-present
          npm run build

      - name: 3. Configurer Nginx et SSL (premier déploiement uniquement)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /var/www/playtoskyproductions.com

            if [ ! -d /etc/letsencrypt/live/playtoskyproductions.com ]; then
              sudo tee /etc/nginx/sites-available/playtoskyproductions.com > /dev/null <<'NGINXEOF'
            server {
                server_name playtoskyproductions.com www.playtoskyproductions.com;
                limit_req zone=mylimit burst=20 nodelay;
                include conf.d/security-headers.conf;

                root /var/www/playtoskyproductions.com;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                listen 80;
                listen [::]:80;
            }
            NGINXEOF
              sudo ln -sf /etc/nginx/sites-available/playtoskyproductions.com /etc/nginx/sites-enabled/playtoskyproductions.com
              sudo certbot --nginx -d playtoskyproductions.com -d www.playtoskyproductions.com \
                --non-interactive --agree-tos -m ${{ secrets.CERTBOT_EMAIL }}
            else
              if [ ! -L /etc/nginx/sites-enabled/playtoskyproductions.com ]; then
                sudo ln -s /etc/nginx/sites-available/playtoskyproductions.com /etc/nginx/sites-enabled/playtoskyproductions.com
              fi
            fi

            sudo nginx -t && sudo systemctl reload nginx

      - name: 4. Préparer le dossier sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /var/www/playtoskyproductions.com
            sudo rm -rf /var/www/playtoskyproductions.com/*

      - name: 5. Envoyer les fichiers prêts au serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "/var/www/playtoskyproductions.com/"
          strip_components: 1

      - name: 6. Sécuriser les droits et recharger Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/playtoskyproductions.com/
            sudo nginx -t && sudo systemctl reload nginx
